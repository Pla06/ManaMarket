@defer (when cards.length > 0) {
  <div class="container-fluid border border-2 rounded mt-3 mb-3 bg-light">
    <div class="d-flex justify-content-between align-items-center flex-wrap p-3">
      <div>
        <h2 class="display-5 mb-0">Listado de cartas</h2>
        <div class="text-muted">Cantidad de cartas: {{ cards.length }}</div>
      </div>
      <button class="btn btn-outline-primary" routerLink="/card/add">Agregar carta</button>
    </div>
    <div class="row g-3 p-3">
      @for (card of cards; track card._id) {
        <div class="col-6 col-md-4 col-lg-3">
          <a class="card-image-link" routerLink="/card/detail/{{card._id}}" [attr.aria-label]="'Ver detalles de ' + card.name">
            <img class="card-image" [src]="card.imageUrl" [alt]="card.name">
          </a>
        </div>
      }
    </div>
  </div>

} @placeholder () {
  <div class="container-fluid text-center">
    <h6 class="display-5 text-primary">Cargando Cards...</h6>
  </div>
}
