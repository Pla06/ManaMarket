<div class="container-fluid edit-container">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-10 col-xl-8 my-4">
      <h2 class="display-5 py-3 text-center fw-bold">{{ editar ? 'Editar carta' : 'Nueva carta' }}</h2>
      
      <form [formGroup]="formCard" (ngSubmit)="addCard()" class="form-card">
        
        <!-- Sección Información básica -->
        <div class="form-section">
          <h4 class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-card-text me-2" viewBox="0 0 16 16">
              <path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2z"/>
              <path d="M3 5.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5M3 8a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9A.5.5 0 0 1 3 8m0 2.5a.5.5 0 0 1 .5-.5h6a.5.5 0 0 1 0 1h-6a.5.5 0 0 1-.5-.5"/>
            </svg>
            Información básica
          </h4>
          
          <div class="form-floating mb-3">
            <input type="text" formControlName="name" class="form-control" id="name" placeholder="name">
            <label for="name">Nombre de la carta</label>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="collection" class="form-label">Colección</label>
              <select class="form-select" id="collection" formControlName="collection">
                <option value="" disabled>Selecciona una colección</option>
                @for (collection of collectionList; track $index) {
                  <option value="{{collection}}">{{ collection }}</option>
                }
              </select>
            </div>
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" formControlName="rarity" class="form-control" id="rarity" placeholder="rarity">
                <label for="rarity">Rareza</label>
              </div>
            </div>
          </div>

          <div class="add-collection-row">
            <div class="row align-items-end">
              <div class="col-8">
                <div [formGroup]="myNewCollection" class="form-floating">
                  <input type="text" formControlName="newCollection" class="form-control" placeholder="Nueva colección" id="newCollection">
                  <label for="newCollection">Nueva colección</label>
                </div>
              </div>
              <div class="col-4">
                <button class="btn btn-outline-primary w-100" type="button" (click)="addNewCollection()">+ Agregar</button>
              </div>
            </div>
          </div>

          <div class="form-floating mb-3">
            <input type="text" formControlName="type" class="form-control" id="type" placeholder="type">
            <label for="type">Tipo de carta</label>
          </div>
        </div>

        <!-- Sección Precio y Stock -->
        <div class="form-section">
          <h4 class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-cash-coin me-2" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M11 15a4 4 0 1 0 0-8 4 4 0 0 0 0 8m5-4a5 5 0 1 1-10 0 5 5 0 0 1 10 0"/>
              <path d="M9.438 11.944c.047.596.518 1.06 1.363 1.116v.44h.375v-.443c.875-.061 1.386-.529 1.386-1.207 0-.618-.39-.936-1.09-1.1l-.296-.07v-1.2c.376.043.614.248.671.532h.658c-.047-.575-.54-1.024-1.329-1.073V8.5h-.375v.45c-.747.073-1.255.522-1.255 1.158 0 .562.378.92 1.007 1.066l.248.061v1.272c-.384-.058-.639-.27-.696-.563h-.668zm1.36-1.354c-.369-.085-.569-.26-.569-.522 0-.294.216-.514.572-.578v1.1zm.432.746c.449.104.655.272.655.569 0 .339-.257.571-.709.614v-1.195z"/>
              <path d="M1 0a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h4.083q.088-.517.258-1H3a2 2 0 0 0-2-2V3a2 2 0 0 0 2-2h10a2 2 0 0 0 2 2v3.528c.38.34.717.728 1 1.154V1a1 1 0 0 0-1-1z"/>
              <path d="M9.998 5.083 10 5a2 2 0 1 0-3.132 1.65 6 6 0 0 1 3.13-1.567"/>
            </svg>
            Precio y disponibilidad
          </h4>
          
          <div class="row">
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="number" formControlName="price" class="form-control" id="price" placeholder="price" min="0" step="0.01">
                <label for="price">Precio (€)</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="number" formControlName="stock" class="form-control" id="stock" placeholder="stock" min="0" step="1">
                <label for="stock">Stock disponible</label>
              </div>
            </div>
          </div>
        </div>

        <!-- Sección Detalles -->
        <div class="form-section">
          <h4 class="section-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-info-circle me-2" viewBox="0 0 16 16">
              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
              <path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533z"/>
              <circle cx="8" cy="4.5" r="1"/>
            </svg>
            Detalles adicionales
          </h4>
          
          <div class="row">
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" formControlName="language" class="form-control" id="language" placeholder="language">
                <label for="language">Idioma</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating mb-3">
                <input type="text" formControlName="condition" class="form-control" id="condition" placeholder="condition">
                <label for="condition">Estado</label>
              </div>
            </div>
          </div>

          <div class="form-floating mb-3">
            <input type="text" formControlName="imageUrl" class="form-control" id="imageUrl" placeholder="https://">
            <label for="imageUrl">URL de la imagen</label>
          </div>
        </div>

        <!-- Botones -->
        <div class="d-flex justify-content-between gap-3 mt-4">
          <button type="button" class="btn btn-outline-secondary btn-lg px-4" routerLink="/card/list">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left me-2" viewBox="0 0 16 16">
              <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
            </svg>
            Cancelar
          </button>
          <button type="submit" class="btn btn-success btn-lg px-5">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-check-circle me-2" viewBox="0 0 16 16">
              <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
              <path d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"/>
            </svg>
            {{editar? 'Actualizar' : 'Crear carta'}}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
