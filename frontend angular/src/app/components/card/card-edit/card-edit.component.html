<div class="container-fluid">
  <div class="row">
    <div class="col-md-7 col-lg-8 my-3">
      <h2 class="display-4 py-3 text-center">{{ editar ? 'Editar carta' : 'Nueva carta' }}</h2>
      <form [formGroup]="formCard" (ngSubmit)="addCard()">
        <div class="form-floating mb-3">
          <input type="text" formControlName="name" class="form-control" id="name" placeholder="name">
          <label for="name">Nombre</label>
        </div>

        <div class="row mt-3">
          <div class="col-md-6">
            <label for="collection" class="form-label">Coleccion</label>
            <select class="form-select" id="collection" formControlName="collection">
              <option value="" disabled>Selecciona una coleccion</option>
              @for (collection of collectionList; track $index) {
                <option value="{{collection}}">{{ collection }}</option>
              }
            </select>
          </div>
          <div class="col-md-6">
            <div class="form-floating mb-3">
              <input type="text" formControlName="rarity" class="form-control" id="rarity" placeholder="rarity">
              <label for="rarity">Rareza</label>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-8">
            <div [formGroup]="myNewCollection" class="form-floating mb-3">
              <input type="text" formControlName="newCollection" class="form-control" placeholder="Nueva coleccion" id="newCollection">
              <label for="newCollection">Agregar nueva coleccion</label>
            </div>
          </div>
          <div class="col-4">
            <button class="btn btn-outline-primary w-100" type="button" (click)="addNewCollection()">Agregar coleccion</button>
          </div>
        </div>

        <div class="form-floating mb-3">
          <input type="text" formControlName="type" class="form-control" id="type" placeholder="type">
          <label for="type">Tipo</label>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-floating mb-3">
              <input type="number" formControlName="price" class="form-control" id="price" placeholder="price" min="0" step="0.01">
              <label for="price">Precio</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating mb-3">
              <input type="number" formControlName="stock" class="form-control" id="stock" placeholder="stock" min="0" step="1">
              <label for="stock">Stock</label>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="form-floating mb-3">
              <input type="text" formControlName="language" class="form-control" id="language" placeholder="language">
              <label for="language">Idioma</label>
            </div>
          </div>
          <div class="col-md-6">
            <div class="form-floating mb-3">
              <input type="text" formControlName="condition" class="form-control" id="condition" placeholder="condition">
              <label for="condition">Estado</label>
            </div>
          </div>
        </div>

        <div class="form-floating mb-3">
          <input type="text" formControlName="imageUrl" class="form-control" id="imageUrl" placeholder="https://">
          <label for="imageUrl">URL de imagen</label>
        </div>

        <div class="d-flex justify-content-center">
          <button type="submit" class="btn btn-success w-50">
            {{editar? 'Actualizar Card' : 'Agregar Nueva Card'}}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
